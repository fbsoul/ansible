  ---

  - hosts: loadbalancer
      become: true
      tasks:
        -service: name=nginx state=stopped

  - hosts: webservers
      become: true
      tasks:
        - service: name=httpd state=stopped

  - hosts: db
      become: true
      tasks:
        - service: name=mysql state=restarted

  - hosts: webservers
      become: true
      tasks:
        - service: name=httpd state=started

  - hosts: loadbalancer
      become: true
      tasks:
        - service: name=nginx state=started
